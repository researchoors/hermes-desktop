appId: com.hermes-agent.web-ui-electron
productName: Hermes Agent
copyright: Copyright 2026 hankbobtheresearchoor

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - resources/**/*

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  background: resources/dmg-background.png
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico

linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
  category: Development

publish:
  provider: github
  owner: hankbobtheresearchoor
  repo: hermes-web-ui-electron
